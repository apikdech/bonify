version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: receipt-manager-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: receipt_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - receipt-manager

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: receipt-manager-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - receipt-manager

  # RustFS Object Storage (S3-compatible)
  rustfs:
    image: rustfs/rustfs:latest
    container_name: receipt-manager-rustfs
    environment:
      RUSTFS_ROOT_USER: rustfsadmin
      RUSTFS_ROOT_PASSWORD: rustfsadmin
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web Console
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - receipt-manager

  # Create RustFS bucket on startup
  rustfs-init:
    image: rustfs/mc:latest
    container_name: receipt-manager-rustfs-init
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myrustfs http://rustfs:9000 rustfsadmin rustfsadmin;
      /usr/bin/mc mb myrustfs/receipts || true;
      /usr/bin/mc anonymous set download myrustfs/receipts;
      exit 0;
      "
    networks:
      - receipt-manager

  # Temporal Server (Workflow Engine)
  temporal:
    image: temporalio/auto-setup:latest
    container_name: receipt-manager-temporal
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - receipt-manager

  # Temporal Web UI
  temporal-ui:
    image: temporalio/ui:latest
    container_name: receipt-manager-temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8088:8080"
    depends_on:
      - temporal
    networks:
      - receipt-manager

volumes:
  postgres_data:
  redis_data:
  rustfs_data:
  rustfs_logs:

networks:
  receipt-manager:
    driver: bridge
