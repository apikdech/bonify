services:
  # ============================================================================
  # Traefik Reverse Proxy
  # ============================================================================
  traefik:
    image: traefik:v3.6
    container_name: receipt-manager-traefik
    command:
      - "--api.insecure=true" # ⚠️ Only for development! Disable in production
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.ping.address=:8082"
      - "--ping=true"
      - "--log.level=INFO"
      - "--log.format=json"
      - "--accesslog=true"
      - "--accesslog.format=json"
    ports:
      - "80:80"
      - "8080:8080" # Traefik dashboard (development only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - receipt-manager
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================================================
  # Receipt Manager Backend API
  # ============================================================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: receipt-manager-api
    command: ["/usr/local/bin/api"]
    environment:
      - SERVER_PORT=8080
      - SERVER_ENV=production
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/receipt_manager?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - JWT_ACCESS_TTL=15m
      - JWT_REFRESH_TTL=168h
      - RUSTFS_ENDPOINT=http://rustfs:9000
      - RUSTFS_ACCESS_KEY=rustfsadmin
      - RUSTFS_SECRET_KEY=rustfsadmin
      - RUSTFS_BUCKET=receipts
      - RUSTFS_USE_SSL=false
      - RUSTFS_REGION=us-east-1
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - TEMPORAL_TASK_QUEUE=receipt-tasks
      - FX_PROVIDER=exchangerate-api
      - FX_BASE_CURRENCY=USD
      - FX_REFRESH_CRON=0 0 * * *
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_PUBLIC_KEY=${DISCORD_PUBLIC_KEY:-}
      - APP_URL=${APP_URL:-http://localhost}
      - OCR_CONFIDENCE_THRESHOLD=0.85
    labels:
      # Enable Traefik
      - "traefik.enable=true"

      # API Routes
      - "traefik.http.routers.api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.routers.api.service=api"
      - "traefik.http.routers.api.middlewares=cors@file,rate-limit-api@file,compression@file"

      # Webhook Routes
      - "traefik.http.routers.webhooks.rule=PathPrefix(`/webhooks`)"
      - "traefik.http.routers.webhooks.entrypoints=web"
      - "traefik.http.routers.webhooks.service=api"
      - "traefik.http.routers.webhooks.middlewares=rate-limit-webhooks@file,compression@file"

      # Health Check (no rate limiting)
      - "traefik.http.routers.health.rule=Path(`/health`)"
      - "traefik.http.routers.health.entrypoints=web"
      - "traefik.http.routers.health.service=api"
      - "traefik.http.routers.health.priority=100"

      # Service definition
      - "traefik.http.services.api.loadbalancer.server.port=8080"
      - "traefik.http.services.api.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.api.loadbalancer.healthcheck.interval=10s"
      - "traefik.http.services.api.loadbalancer.healthcheck.timeout=5s"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      temporal:
        condition: service_healthy
      temporal-create-namespace:
        condition: service_completed_successfully
    networks:
      - receipt-manager
    restart: unless-stopped

  # ============================================================================
  # Receipt Manager Temporal Worker
  # ============================================================================
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: receipt-manager-worker
    command: ["/usr/local/bin/worker"]
    environment:
      - SERVER_ENV=production
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/receipt_manager?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - RUSTFS_ENDPOINT=http://rustfs:9000
      - RUSTFS_ACCESS_KEY=rustfsadmin
      - RUSTFS_SECRET_KEY=rustfsadmin
      - RUSTFS_BUCKET=receipts
      - RUSTFS_USE_SSL=false
      - RUSTFS_REGION=us-east-1
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - TEMPORAL_TASK_QUEUE=receipt-tasks
      - FX_PROVIDER=exchangerate-api
      - FX_BASE_CURRENCY=USD
      - FX_REFRESH_CRON=0 0 * * *
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_PUBLIC_KEY=${DISCORD_PUBLIC_KEY:-}
      - APP_URL=${APP_URL:-http://localhost}
      - OCR_CONFIDENCE_THRESHOLD=0.85
    # Note: No traefik labels - workers don't expose HTTP
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      temporal:
        condition: service_healthy
      temporal-create-namespace:
        condition: service_completed_successfully
    networks:
      - receipt-manager
    restart: unless-stopped

  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  postgres:
    image: postgres:18-alpine
    container_name: receipt-manager-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: receipt_manager
    volumes:
      - postgres_data:/var/lib/postgresql/data
    labels:
      # Disable Traefik for this service
      - "traefik.enable=false"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - receipt-manager
    restart: unless-stopped

  # ============================================================================
  # Redis Cache
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: receipt-manager-redis
    volumes:
      - redis_data:/data
    labels:
      - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - receipt-manager
    restart: unless-stopped

  # ============================================================================
  # RustFS Object Storage (S3-compatible)
  # ============================================================================
  rustfs:
    image: rustfs/rustfs:latest
    container_name: receipt-manager-rustfs
    # See https://github.com/rustfs/rustfs/blob/main/docker-compose-simple.yml — use ACCESS_KEY/SECRET_KEY (not ROOT_*).
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs
    labels:
      - "traefik.enable=false"
    # GET / returns 403 without auth; /health is the documented liveness URL (curl -f would fail on /).
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - receipt-manager
    restart: unless-stopped

  # ============================================================================
  # Create RustFS bucket on startup
  # ============================================================================
  # MinIO Client image (S3 API); RustFS does not publish rustfs/mc — any S3 client works.
  rustfs-init:
    image: minio/mc:latest
    container_name: receipt-manager-rustfs-init
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myrustfs http://rustfs:9000 rustfsadmin rustfsadmin &&
      mc mb --ignore-existing myrustfs/receipts &&
      mc anonymous set download myrustfs/receipts;
      exit 0;
      "
    labels:
      - "traefik.enable=false"
    networks:
      - receipt-manager
    restart: on-failure

  # ============================================================================
  # Temporal (supported stack: temporalio/server + admin-tools; auto-setup is deprecated
  # per https://hub.docker.com/r/temporalio/auto-setup — pattern from
  # https://github.com/temporalio/samples-server/tree/main/compose )
  # ============================================================================
  temporal-setup:
    image: temporalio/admin-tools:1.30.1
    container_name: receipt-manager-temporal-setup
    restart: on-failure:6
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=postgres
      # temporal-sql-tool reads password from SQL_PASSWORD (-p is port, not password)
      - SQL_PASSWORD=postgres
    networks:
      - receipt-manager
    volumes:
      - ./temporal/scripts:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/setup-postgres.sh"]

  temporal:
    image: temporalio/server:1.30.1
    container_name: receipt-manager-temporal
    depends_on:
      temporal-setup:
        condition: service_completed_successfully
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=postgres
      - BIND_ON_IP=0.0.0.0
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    volumes:
      - ./temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    labels:
      - "traefik.enable=false"
    networks:
      - receipt-manager
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "7233"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 60

  temporal-create-namespace:
    image: temporalio/admin-tools:1.30.1
    container_name: receipt-manager-temporal-namespace
    restart: on-failure:5
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - DEFAULT_NAMESPACE=default
    networks:
      - receipt-manager
    volumes:
      - ./temporal/scripts:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/create-namespace.sh"]

  # ============================================================================
  # Temporal Web UI
  # ============================================================================
  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: receipt-manager-temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      # Required when exposing UI under a subpath; do not use StripPrefix (see Temporal docs).
      - TEMPORAL_UI_PUBLIC_PATH=/temporal
      - TEMPORAL_DEFAULT_NAMESPACE=default
      - TEMPORAL_CORS_ORIGINS=http://localhost,http://localhost:3000,http://localhost:8080
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.temporal-ui.rule=PathPrefix(`/temporal`)"
      - "traefik.http.routers.temporal-ui.entrypoints=web"
      - "traefik.http.routers.temporal-ui.service=temporal-ui"
      - "traefik.http.services.temporal-ui.loadbalancer.server.port=8080"
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - receipt-manager
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rustfs_data:
  rustfs_logs:

networks:
  # Pin name so traefik.yml `providers.docker.network: receipt-manager` matches (Compose
  # default would be `<project>_receipt-manager`, e.g. bonify_receipt-manager, and Traefik
  # would not route any Docker backends).
  receipt-manager:
    name: receipt-manager
    driver: bridge
